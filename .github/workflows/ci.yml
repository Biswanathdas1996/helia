name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/api-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --upgrade pip
      - run: pip install ".[dev]"
      - name: Compile-time syntax check
        run: python -m compileall app
      - name: Run tests (skipped when no tests/ dir)
        run: |
          if [ -d tests ]; then pytest -q; else echo "no tests directory; skipping"; fi

  docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push api-server image
        uses: docker/build-push-action@v6
        with:
          context: artifacts/api-server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/helia-api:latest
            ghcr.io/${{ github.repository_owner }}/helia-api:${{ github.sha }}
      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/support-ai/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/helia-web:latest
            ghcr.io/${{ github.repository_owner }}/helia-web:${{ github.sha }}
