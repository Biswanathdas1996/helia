apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: helia-redis
spec:
  serviceName: helia-redis
  replicas: 1
  selector:
    matchLabels: { app: helia-redis }
  template:
    metadata:
      labels: { app: helia-redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--save", "60", "1", "--loglevel", "warning"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: { storage: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: helia-redis
spec:
  selector: { app: helia-redis }
  ports:
    - { port: 6379, targetPort: 6379 }
  clusterIP: None
